name: Daily Market Scan

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:

  run-model:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install packages
      run: |
        pip install pandas numpy requests yfinance

    - name: Run Liquidity Model
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        python liquidity_model.py

    - name: Run Market Scan
      run: |
        python market_scan.py

    - name: Commit Results
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add liquidity_output.json
        git add market_scan.json
        git commit -m "Daily macro and market scan update" || echo "No changes"
        git push
